<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Web Viewer</title>
    <style>
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f6f8fa;
            --bg-tertiary: #e8ecf0;
            --text-primary: #1a1a1a;
            --text-secondary: #65676b;
            --text-muted: #9e9ea0;
            --border-color: #e4e6eb;
            --accent-color: #6364ff;
            --user-bg: #6364ff;
            --user-text: #ffffff;
            --assistant-bg: #f6f8fa;
            --assistant-text: #1a1a1a;
            --assistant-border: #e4e6eb;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px rgba(0, 0, 0.1);
            --radius-md: 8px;
            --radius-lg: 12px;
        }

        [data-theme="dark"] {
            --bg-primary: #1a1a1a;
            --bg-secondary: #242526;
            --bg-tertiary: #323436;
            --text-primary: #ffffff;
            --text-secondary: #b0b3b8;
            --text-muted: #7a7d84;
            --border-color: #393a3b;
            --accent-color: #8b8cff;
            --user-bg: #4a4b95;
            --user-text: #ffffff;
            --assistant-bg: #242526;
            --assistant-text: #b0b3b8;
            --assistant-border: #393a3b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* Header */
        .header {
            background-color: var(--bg-primary);
            border-bottom: 1px solid var(--border-color);
            padding: 12px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow-sm);
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 28px;
            height: 28px;
        }

        .logo-text {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--accent-color);
        }

        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        /* Session selector */
        .session-selector {
            position: relative;
        }

        .session-selector select {
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 0.9rem;
            cursor: pointer;
            min-width: 200px;
        }

        .session-selector select:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        /* Theme toggle */
        .theme-toggle {
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            border-radius: var(--radius-md);
            color: var(--text-secondary);
        }

        .theme-toggle:hover {
            background-color: var(--bg-tertiary);
            color: var(--text-primary);
        }

        /* Refresh button */
        .refresh-button {
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            border-radius: var(--radius-md);
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .refresh-button:hover {
            background-color: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .refresh-button.refreshing {
            color: var(--accent-color);
        }

        .refresh-button .refresh-icon {
            width: 16px;
            height: 16px;
        }

        .refresh-text {
            font-size: 0.85rem;
        }

        .stats-button {
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: var(--radius-md);
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
        }

        .stats-button:hover {
            background-color: var(--bg-tertiary);
            color: var(--text-primary);
        }

        /* Main container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Messages container */
        .messages-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Message styling */
        .message {
            display: flex;
            gap: 16px;
            padding: 16px 20px;
            border-radius: var(--radius-lg);
            max-width: 90%;
        }

        .message.user {
            background-color: var(--user-bg);
            color: var(--user-text);
            align-self: flex-end;
            border-top-right-radius: 0;
        }

        .message.assistant {
            background-color: var(--assistant-bg);
            color: var(--assistant-text);
            border: 1px solid var(--assistant-border);
            align-self: flex-start;
            border-top-left-radius: 0;
        }

        .message.system {
            background-color: var(--bg-tertiary);
            color: var(--text-secondary);
            font-size: 0.85rem;
            padding: 12px 20px;
            align-self: center;
            border-radius: var(--radius-md);
        }

        /* Avatar */
        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .message.user .avatar {
            background-color: rgba(255, 255, 255, 0.2);
            color: var(--user-text);
        }

        .message.assistant .avatar {
            background-color: var(--accent-color);
            color: white;
        }

        .message.system .avatar {
            display: none;
        }

        /* Message content */
        .message-content {
            flex: 1;
            overflow-wrap: anywhere;
        }

        .message-content p {
            margin: 0 0 12px 0;
        }

        .message-content p:last-child {
            margin-bottom: 0;
        }

        /* Code blocks */
        .message-content pre {
            background-color: rgba(0, 0, 0, 0.05);
            padding: 12px;
            border-radius: var(--radius-md);
            overflow-x: auto;
            margin: 12px 0;
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        [data-theme="dark"] .message-content pre {
            background-color: rgba(255, 255, 255, 0.05);
        }

        .message-content code {
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
            font-size: 0.9rem;
            background-color: rgba(0, 0, 0, 0.05);
            padding: 2px 4px;
            border-radius: 3px;
        }

        [data-theme="dark"] .message-content code {
            background-color: rgba(255, 255, 255, 0.05);
        }

        /* Markdown styling */
        .message-content h1,
        .message-content h2,
        .message-content h3,
        .message-content h4,
        .message-content h5,
        .message-content h6 {
            margin: 16px 0 12px 0;
            color: var(--text-primary);
        }

        .message-content ul,
        .message-content ol {
            margin: 12px 0;
            padding-left: 24px;
        }

        .message-content li {
            margin: 6px 0;
        }

        .message-content blockquote {
            border-left: 3px solid var(--border-color);
            padding-left: 12px;
            margin: 12px 0;
            color: var(--text-secondary);
        }

        .message-content hr {
            border: none;
            border-top: 1px solid var(--border-color);
            margin: 20px 0;
        }

        /* Tables */
        .message-content table {
            border-collapse: collapse;
            width: 100%;
            margin: 12px 0;
        }

        .message-content th,
        .message-content td {
            padding: 8px 12px;
            text-align: left;
            border: 1px solid var(--border-color);
        }

        .message-content th {
            background-color: var(--bg-tertiary);
            font-weight: 600;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state h2 {
            margin-bottom: 12px;
            color: var(--text-secondary);
        }

        /* Loading indicator */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid var(--border-color);
            border-radius: 50%;
            border-top-color: var(--accent-color);
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Connection status */
        .connection-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--text-muted);
        }

        .status-dot.connected {
            background-color: #23a052;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 12px;
            }

            .message {
                max-width: 100%;
            }

            .message.user {
                border-top-right-radius: var(--radius-md);
            }

            .message.assistant {
                border-top-left-radius: var(--radius-md);
            }

            .header-content {
                flex-direction: column;
                gap: 12px;
            }

            .header-actions {
                flex-wrap: wrap;
                justify-content: center;
            }

            .session-selector select {
                min-width: 100%;
            }
        }

        /* Smooth scrolling */
        html {
            scroll-behavior: smooth;
        }

        /* Modal styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background-color: var(--bg-primary);
            border-radius: var(--radius-lg);
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: var(--shadow-md);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .modal-header h2 {
            margin: 0;
            font-size: 1.2rem;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-secondary);
            padding: 4px 8px;
            border-radius: var(--radius-md);
        }

        .modal-close:hover {
            background-color: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .modal-body {
            padding: 20px;
        }

        .stats-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
        }

        .stats-table th,
        .stats-table td {
            padding: 10px 12px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        .stats-table th {
            background-color: var(--bg-tertiary);
            font-weight: 600;
        }

        .stats-table tr:hover {
            background-color: var(--bg-tertiary);
        }

        .stats-total {
            font-weight: 600;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 2px solid var(--accent-color);
        }

        .rename-input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 0.95rem;
            margin: 12px 0;
        }

        .rename-input:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 16px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 0.9rem;
            border: none;
        }

        .btn-primary {
            background-color: var(--accent-color);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--accent-color);
            filter: brightness(1.1);
        }

        .btn-cancel {
            background-color: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .btn-cancel:hover {
            background-color: var(--border-color);
        }

        /* Rename button in session dropdown */
        .session-rename-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px 8px;
            color: var(--text-secondary);
            font-size: 0.8rem;
            margin-left: 8px;
            border-radius: var(--radius-md);
        }

        .session-rename-btn:hover {
            background-color: var(--bg-tertiary);
            color: var(--accent-color);
        }

        /* Dashboard styles */
        .dashboard {
            max-width: 100%;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .dashboard-header h1 {
            font-size: 1.5rem;
            margin: 0;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background-color: var(--bg-secondary);
            border-radius: var(--radius-lg);
            padding: 20px;
            text-align: center;
            border: 1px solid var(--border-color);
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent-color);
            margin-bottom: 8px;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .session-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .session-item {
            background-color: var(--bg-secondary);
            border-radius: var(--radius-md);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            border: 1px solid var(--border-color);
            transition: background-color 0.2s;
        }

        .session-item:hover {
            background-color: var(--bg-tertiary);
        }

        .session-item-info {
            flex: 1;
            min-width: 0;
        }

        .session-item-title {
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .session-item-meta {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .session-item-bar {
            height: 8px;
            background-color: var(--bg-tertiary);
            border-radius: 4px;
            flex: 1;
            overflow: hidden;
            min-width: 100px;
        }

        .session-item-bar-fill {
            height: 100%;
            background-color: var(--accent-color);
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .session-item-tokens {
            font-size: 0.8rem;
            color: var(--text-secondary);
            min-width: 80px;
            text-align: right;
        }

        .messages-header {
            margin-bottom: 20px;
        }

        /* Auto-scroll to bottom button */
        .scroll-to-bottom {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background-color: var(--accent-color);
            color: white;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-md);
            opacity: 0;
            transition: opacity 0.2s, transform 0.2s;
            transform: translateY(20px);
        }

        .scroll-to-bottom.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .scroll-to-bottom:hover {
            background-color: var(--accent-color);
            filter: brightness(1.1);
        }

        .scroll-to-bottom svg {
            width: 24px;
            height: 24px;
        }

        /* Last updated time */
        .last-updated {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-align: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 20px;
        }
    </style>
</head>
<body data-theme="dark">
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span class="logo-text">Vibe Viewer</span>
            </div>
            <div class="header-actions">
                <div class="session-selector">
                    <select id="sessionSelect">
                        <option value="">Loading...</option>
                    </select>
                    <button class="session-rename-btn" id="renameCurrentBtn" title="Rename current session">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                        </svg>
                    </button>
                </div>
                <button class="refresh-button" id="refreshButton" title="Refresh conversation">
                    <svg class="refresh-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M23 4v6h-6M1 20v-6h6"/>
                        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                    </svg>
                    <span class="refresh-text">Refresh</span>
                </button>
                <button class="stats-button" id="statsButton" title="View token statistics">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                        <path d="M18 20V10"/>
                        <path d="M12 20V4"/>
                        <path d="M6 20v-6"/>
                    </svg>
                    <span>Stats</span>
                </button>
                <button class="theme-toggle" id="themeToggle" title="Toggle theme">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                        <circle cx="12" cy="12" r="5"/>
                        <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <div class="container">
        <!-- Dashboard/Stats View -->
        <div class="dashboard" id="dashboard">
            <div class="dashboard-header">
                <h1>Session Overview</h1>
                <button class="btn btn-primary" id="showMessagesBtn">View Conversations</button>
            </div>
            <div class="stats-grid" id="statsGrid">
                <div class="stat-card">
                    <div class="stat-value" id="totalSessions">-</div>
                    <div class="stat-label">Total Sessions</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="totalTokens">-</div>
                    <div class="stat-label">Total Tokens</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="totalMessages">-</div>
                    <div class="stat-label">Total Messages</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="avgTokens">-</div>
                    <div class="stat-label">Avg Tokens/Session</div>
                </div>
            </div>
            <div class="session-list" id="sessionList"></div>
        </div>
        
        <!-- Messages View -->
        <div class="messages-view" id="messagesView" style="display: none;">
            <div class="messages-header">
                <button class="btn btn-cancel" id="backToDashboard">← Back to Overview</button>
            </div>
            <div class="last-updated" id="lastUpdated"></div>
            <div class="messages-container" id="messagesContainer">
                <div class="empty-state">
                    <div class="loading"></div>
                    <p>Loading conversation...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Stats Modal -->
    <div class="modal" id="statsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Token Statistics</h2>
                <button class="modal-close" id="closeStats">&times;</button>
            </div>
            <div class="modal-body" id="statsContent">
                <p>Loading...</p>
            </div>
        </div>
    </div>

    <!-- Rename Modal -->
    <div class="modal" id="renameModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Rename Session</h2>
                <button class="modal-close" id="closeRename">&times;</button>
            </div>
            <div class="modal-body">
                <p>Session: <span id="renameSessionName"></span></p>
                <input type="text" id="newSessionName" placeholder="New title" class="rename-input">
                <div class="modal-actions">
                    <button class="btn btn-cancel" id="cancelRename">Cancel</button>
                    <button class="btn btn-primary" id="confirmRename">Rename</button>
                </div>
            </div>
        </div>
    </div>

    <button class="scroll-to-bottom" id="scrollToBottom" title="Scroll to bottom">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="8,18 16,18 16,6"/>
        </svg>
    </button>

    <script>
        // Theme management
        const theme = localStorage.getItem('theme') || 'dark';
        document.body.setAttribute('data-theme', theme);

        // Track current session and last update time
        let currentSessionId = null;
        let lastUpdateTime = null;

        // Markdown rendering
        function renderMarkdown(content) {
            // Escape HTML
            content = content
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');

            // Headers
            content = content
                .replace(/^# (.*$)/gm, '<h1>$1</h1>')
                .replace(/^## (.*$)/gm, '<h2>$1</h2>')
                .replace(/^### (.*$)/gm, '<h3>$1</h3>')
                .replace(/^#### (.*$)/gm, '<h4>$1</h4>')
                .replace(/^##### (.*$)/gm, '<h5>$1</h5>')
                .replace(/^###### (.*$)/gm, '<h6>$1</h6>');

            // Bold and Italic
            content = content
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/__(.*?)__/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/_([^_]+)_/g, '<em>$1</em>');

            // Strike-through
            content = content.replace(/~~(.*?)~~/g, '<del>$1</del>');

            // Links
            content = content.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

            // Images
            content = content.replace(/!\[([^\]]+)\]\(([^)]+)\)/g, '<img src="$2" alt="$1" style="max-width: 100%; border-radius: 8px; margin: 12px 0;">');

            // Horizontal rule
            content = content.replace(/^---$/gm, '<hr>');

            // Lists
            content = content
                .replace(/^\- (.*$)/gm, '<li>$1</li>')
                .replace(/^\* (.*$)/gm, '<li>$1</li>')
                .replace(/^\+ (.*$)/gm, '<li>$1</li>');

            // Numbered lists
            content = content.replace(/^(\d+)\. (.*$)/gm, '<li>$2</li>');

            // Blockquotes
            content = content.replace(/^>(.*)$/gm, '<blockquote>$1</blockquote>');

            // Inline code
            content = content.replace(/`([^`]+)`/g, '<code>$1</code>');

            // Code blocks (```)
            content = content.replace(/```(\w*)\n([\s\S]*?)```/g, (match, lang, code) => {
                return `<pre><code class="language-${lang}">${code.trim()}</code></pre>`;
            });

            // Tables
            content = content.replace(/^\|(.+)\|$/gm, (match) => {
                const row = match.trim();
                if (row.startsWith('|') && row.endsWith('|')) {
                    const cells = row.slice(1, -1).split('|').map(c => c.trim());
                    const isHeader = cells.every(c => /^[-:]+$/.test(c));
                    if (isHeader) {
                        return '<tr>' + cells.map(c => '<th>' + c.replace(/[^:]/g, '').replace(/:/g, '</th><th>') + '</th>').join('') + '</tr>';
                    }
                    const tag = cells[0] === '' ? 'th' : 'td';
                    return '<tr>' + cells.map(c => `<${tag}>${c}</${tag}>`).join('') + '</tr>';
                }
                return row;
            });

            // Wrap tables
            let tableMatch = content.match(/<tr>.*<\/tr>/g);
            if (tableMatch && tableMatch.length > 1) {
                content = content.replace(/((?:<tr>.*<\/tr>\n?)+)/g, '<table>$1</table>');
            }

            // Wrap list items in ul/ol
            content = content.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');

            return content;
        }

        // Create message element
        function createMessageElement(message) {
            const msgEl = document.createElement('div');
            msgEl.className = `message ${message.role}`;

            const avatarEl = document.createElement('div');
            avatarEl.className = 'avatar';
            avatarEl.textContent = message.role === 'user' ? 'U' : message.role === 'assistant' ? 'A' : 'S';

            const contentEl = document.createElement('div');
            contentEl.className = 'message-content';
            contentEl.innerHTML = renderMarkdown(message.content || '');

            msgEl.appendChild(avatarEl);
            msgEl.appendChild(contentEl);

            return msgEl;
        }

        // Update last updated time
        function updateLastUpdated() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString();
            const dateStr = now.toLocaleDateString();
            const lastUpdatedEl = document.getElementById('lastUpdated');
            if (lastUpdatedEl) {
                lastUpdatedEl.textContent = `Last updated: ${dateStr} at ${timeStr}`;
            }
            lastUpdateTime = now;
        }

        // Load and display messages
        async function loadMessages(sessionId = null, showLoading = false) {
            const url = sessionId ? `/api/session/${sessionId}` : '/api/messages';
            
            const container = document.getElementById('messagesContainer');
            
            if (showLoading) {
                container.innerHTML = '<div class="empty-state"><div class="loading"></div><p>Loading...</p></div>';
            }
            
            const refreshBtn = document.getElementById('refreshButton');
            if (refreshBtn) {
                refreshBtn.classList.add('refreshing');
                refreshBtn.disabled = true;
            }

            try {
                const response = await fetch(url);
                const data = await response.json();
                
                container.innerHTML = '';
                
                if (data.messages && data.messages.length > 0) {
                    data.messages.forEach(msg => {
                        const msgEl = createMessageElement(msg);
                        container.appendChild(msgEl);
                    });
                } else {
                    container.innerHTML = '<div class="empty-state"><p>No messages in this conversation.</p></div>';
                }
                
                // Update current session ID
                if (data.session_id) {
                    currentSessionId = data.session_id;
                }
                
                // Update last updated time
                updateLastUpdated();
                
                // Scroll to bottom
                scrollToBottom();
                
            } catch (error) {
                console.error('Error loading messages:', error);
                container.innerHTML = `
                    <div class="empty-state">
                        <p>Error loading conversation</p>
                        <p style="font-size: 0.85rem; color: var(--text-muted);">${error.message}</p>
                    </div>
                `;
            } finally {
                if (refreshBtn) {
                    refreshBtn.classList.remove('refreshing');
                    refreshBtn.disabled = false;
                }
            }
        }

        // Current session being renamed
        let renamingSessionId = null;
        let currentSessionTitle = '';
        
        // Track view state
        let isDashboardView = true;

        // Load session list (without loading messages)
        async function loadSessions(loadMessagesFlag = false) {
            try {
                const response = await fetch('/api/sessions');
                const data = await response.json();
                
                const select = document.getElementById('sessionSelect');
                if (select) {
                    select.innerHTML = '';
                    
                    // Add current session first
                    if (data.current_session) {
                        const option = document.createElement('option');
                        option.value = data.current_session;
                        const currentSession = data.sessions.find(s => s.id === data.current_session);
                        const title = currentSession?.meta?.title || data.current_session;
                        option.textContent = `${title} (current, ${currentSession?.message_count || 0} msgs)`;
                        option.selected = true;
                        select.appendChild(option);
                        select.appendChild(document.createElement('option')).disabled = true;
                        select.lastChild.textContent = '─';
                    }
                    
                    // Add other sessions
                    data.sessions.forEach(session => {
                        if (session.id !== data.current_session) {
                            const option = document.createElement('option');
                            option.value = session.id;
                            const title = session.meta?.title || session.id;
                            option.textContent = `${title} (${session.message_count} msgs)`;
                            select.appendChild(option);
                        }
                    });
                }
                
                // Load messages for current session only if requested
                if (loadMessagesFlag && data.current_session) {
                    currentSessionId = data.current_session;
                    const currentSession = data.sessions.find(s => s.id === data.current_session);
                    currentSessionTitle = currentSession?.meta?.title || data.current_session;
                    loadMessages(data.current_session);
                } else if (data.current_session) {
                    currentSessionId = data.current_session;
                    const currentSession = data.sessions.find(s => s.id === data.current_session);
                    currentSessionTitle = currentSession?.meta?.title || data.current_session;
                }
                
            } catch (error) {
                console.error('Error loading sessions:', error);
            }
        }

        // Manual refresh function - refresh everything
        async function refreshConversation() {
            const refreshBtn = document.getElementById('refreshButton');
            const originalText = refreshBtn.innerHTML;
            
            try {
                // Show refreshing state
                refreshBtn.classList.add('refreshing');
                refreshBtn.innerHTML = '<svg class="refresh-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg><span class="refresh-text">Refreshing...</span>';
                refreshBtn.disabled = true;
                
                // Use the unified refresh endpoint that updates both sessions and messages
                const response = await fetch('/api/refresh_all');
                const data = await response.json();
                
                const select = document.getElementById('sessionSelect');
                
                // Update sessions dropdown
                if (select && data.sessions) {
                    const currentValue = select.value;
                    select.innerHTML = '';
                    
                    // Add current session first
                    if (data.current_session) {
                        const option = document.createElement('option');
                        option.value = data.current_session;
                        const currentSession = data.sessions.find(s => s.id === data.current_session);
                        const title = currentSession?.meta?.title || data.current_session;
                        option.textContent = `${title} (current, ${currentSession?.message_count || 0} msgs)`;
                        option.selected = true;
                        select.appendChild(option);
                        select.appendChild(document.createElement('option')).disabled = true;
                        select.lastChild.textContent = '─';
                    }
                    
                    // Add other sessions
                    data.sessions.forEach(session => {
                        if (session.id !== data.current_session) {
                            const option = document.createElement('option');
                            option.value = session.id;
                            const title = session.meta?.title || session.id;
                            option.textContent = `${title} (${session.message_count} msgs)`;
                            select.appendChild(option);
                        }
                    });
                    
                    // Restore previous selection if it still exists
                    if (currentValue) {
                        const options = Array.from(select.options).map(opt => opt.value);
                        if (options.includes(currentValue)) {
                            select.value = currentValue;
                        }
                    }
                }
                
                // Update current session ID and title
                if (data.current_session) {
                    currentSessionId = data.current_session;
                    const currentSession = data.sessions.find(s => s.id === data.current_session);
                    currentSessionTitle = currentSession?.meta?.title || data.current_session;
                    
                    // Update dropdown
                    const select = document.getElementById('sessionSelect');
                    if (select) {
                        select.value = currentSessionId;
                    }
                }
                
                // Update messages
                const container = document.getElementById('messagesContainer');
                if (container && data.messages) {
                    container.innerHTML = '';
                    
                    if (data.messages && data.messages.length > 0) {
                        data.messages.forEach(msg => {
                            const msgEl = createMessageElement(msg);
                            container.appendChild(msgEl);
                        });
                    } else {
                        container.innerHTML = '<div class="empty-state"><p>No messages in this conversation.</p></div>';
                    }
                    
                    // Update last updated time
                    updateLastUpdated();
                    
                    // Scroll to bottom
                    scrollToBottom();
                }
                
            } catch (error) {
                console.error('Error refreshing conversation:', error);
                // Show error to user
                const container = document.getElementById('messagesContainer');
                if (container) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <p>Error refreshing conversation</p>
                            <p style="font-size: 0.85rem; color: var(--text-muted);">${error.message}</p>
                            <button onclick="refreshConversation()" style="margin-top: 10px; padding: 8px 16px; background: var(--accent-color); color: white; border: none; border-radius: 4px; cursor: pointer;">Retry</button>
                        </div>
                    `;
                }
            } finally {
                // Restore original state
                refreshBtn.classList.remove('refreshing');
                refreshBtn.innerHTML = originalText;
                refreshBtn.disabled = false;
            }
        }

        // Scroll to bottom
        function scrollToBottom() {
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        // Theme toggle
        document.getElementById('themeToggle').addEventListener('click', () => {
            const currentTheme = document.body.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.body.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        });

        // Session change
        document.getElementById('sessionSelect').addEventListener('change', (e) => {
            const sessionId = e.target.value;
            if (sessionId) {
                currentSessionId = sessionId;
                // Update current session title from the selected option
                const option = e.target.options[e.target.selectedIndex];
                if (option) {
                    currentSessionTitle = option.textContent.split(' (')[0];
                }
                loadMessages(sessionId);
            }
        });

        // Manual refresh button
        document.getElementById('refreshButton').addEventListener('click', refreshConversation);

        // Scroll to bottom button
        const scrollBtn = document.getElementById('scrollToBottom');
        window.addEventListener('scroll', () => {
            const threshold = 100;
            const atBottom = window.innerHeight + window.scrollY >= document.body.scrollHeight - threshold;
            scrollBtn.classList.toggle('visible', !atBottom);
        });

        scrollBtn.addEventListener('click', scrollToBottom);

        // Stats button
        document.getElementById('statsButton').addEventListener('click', showStats);
        document.getElementById('closeStats').addEventListener('click', closeStatsModal);
        
        // Rename current session button
        document.getElementById('renameCurrentBtn').addEventListener('click', () => {
            if (currentSessionId) {
                showRenameModal(currentSessionId, currentSessionTitle);
            }
        });
        
        // Rename modal
        document.getElementById('closeRename').addEventListener('click', closeRenameModal);
        document.getElementById('cancelRename').addEventListener('click', closeRenameModal);
        document.getElementById('confirmRename').addEventListener('click', confirmRename);
        
        // Close modals on background click
        document.getElementById('statsModal').addEventListener('click', (e) => {
            if (e.target.id === 'statsModal') closeStatsModal();
        });
        document.getElementById('renameModal').addEventListener('click', (e) => {
            if (e.target.id === 'renameModal') closeRenameModal();
        });
        
        // Rename on Enter key
        document.getElementById('newSessionName').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') confirmRename();
        });
        
        // View conversations button
        document.getElementById('showMessagesBtn').addEventListener('click', () => {
            switchToMessagesView(currentSessionId);
        });
        
        // Back to dashboard button
        document.getElementById('backToDashboard').addEventListener('click', () => {
            document.getElementById('messagesView').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            isDashboardView = true;
        });

        // Keyboard shortcut for refresh (Ctrl+R or Cmd+R)
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'r') {
                e.preventDefault();
                refreshConversation();
            }
        });

        // Load and display dashboard
        async function loadDashboard() {
            try {
                const response = await fetch('/api/token_stats');
                const data = await response.json();
                
                if (data.sessions && data.sessions.length > 0) {
                    // Update stat cards
                    document.getElementById('totalSessions').textContent = data.total_sessions.toLocaleString();
                    document.getElementById('totalTokens').textContent = data.total_tokens.toLocaleString();
                    
                    const totalMessages = data.sessions.reduce((sum, s) => sum + s.message_count, 0);
                    document.getElementById('totalMessages').textContent = totalMessages.toLocaleString();
                    
                    const avgTokens = Math.round(data.total_tokens / data.total_sessions);
                    document.getElementById('avgTokens').textContent = avgTokens.toLocaleString();
                    
                    // Build session list with bars
                    const maxTokens = Math.max(...data.sessions.map(s => s.token_count));
                    const sessionList = document.getElementById('sessionList');
                    
                    sessionList.innerHTML = data.sessions.slice(0, 20).map(s => {
                        const percent = maxTokens > 0 ? (s.token_count / maxTokens * 100) : 0;
                        const title = s.title || s.session_id;
                        const shortTitle = title.length > 40 ? title.substring(0, 37) + '...' : title;
                        
                        return `
                            <div class="session-item" data-session-id="${s.session_id}">
                                <div class="session-item-info">
                                    <div class="session-item-title">${shortTitle}</div>
                                    <div class="session-item-meta">${s.message_count} messages</div>
                                </div>
                                <div class="session-item-bar">
                                    <div class="session-item-bar-fill" style="width: ${percent}%"></div>
                                </div>
                                <div class="session-item-tokens">${s.token_count.toLocaleString()}</div>
                            </div>
                        `;
                    }).join('');
                    
                    if (data.sessions.length > 20) {
                        const moreEl = document.createElement('div');
                        moreEl.className = 'session-item-meta';
                        moreEl.style.textAlign = 'center';
                        moreEl.style.marginTop = '8px';
                        moreEl.textContent = `+ ${data.sessions.length - 20} more sessions`;
                        sessionList.appendChild(moreEl);
                    }
                    
                    // Add click handlers to session items
                    document.querySelectorAll('.session-item').forEach(item => {
                        item.addEventListener('click', () => {
                            const sessionId = item.getAttribute('data-session-id');
                            switchToMessagesView(sessionId);
                        });
                    });
                }
            } catch (error) {
                console.error('Error loading dashboard:', error);
            }
        }

        // Switch to messages view
        function switchToMessagesView(sessionId) {
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('messagesView').style.display = 'block';
            isDashboardView = false;
            
            if (sessionId) {
                currentSessionId = sessionId;
                loadMessages(sessionId);
                
                // Update session selector
                const select = document.getElementById('sessionSelect');
                if (select) {
                    select.value = sessionId;
                    // Update current session title
                    const option = Array.from(select.options).find(o => o.value === sessionId);
                    if (option) {
                        currentSessionTitle = option.textContent.split(' (')[0];
                    }
                }
            }
        }

        // Show stats modal
        async function showStats() {
            const modal = document.getElementById('statsModal');
            const content = document.getElementById('statsContent');
            
            modal.classList.add('active');
            content.innerHTML = '<p>Loading statistics...</p>';
            
            try {
                const response = await fetch('/api/token_stats');
                const data = await response.json();
                
                if (data.sessions && data.sessions.length > 0) {
                    let html = `<table class="stats-table">
                        <thead>
                            <tr>
                                <th>Session</th>
                                <th>Messages</th>
                                <th>Tokens</th>
                            </tr>
                        </thead>
                        <tbody>`;
                    
                    data.sessions.forEach(s => {
                        html += `<tr>
                            <td>${s.title || s.session_id}</td>
                            <td>${s.message_count}</td>
                            <td>${s.token_count.toLocaleString()}</td>
                        </tr>`;
                    });
                    
                    html += `</tbody></table>
                        <div class="stats-total">
                            Total: ${data.total_tokens.toLocaleString()} tokens across ${data.total_sessions} sessions
                        </div>`;
                    
                    content.innerHTML = html;
                } else {
                    content.innerHTML = '<p>No session statistics available.</p>';
                }
            } catch (error) {
                content.innerHTML = '<p>Error loading statistics.</p>';
                console.error('Error loading stats:', error);
            }
        }

        // Rename session
        function showRenameModal(sessionId, sessionTitle) {
            renamingSessionId = sessionId;
            document.getElementById('renameSessionName').textContent = sessionTitle || sessionId;
            document.getElementById('newSessionName').value = sessionTitle || '';
            document.getElementById('renameModal').classList.add('active');
            document.getElementById('newSessionName').focus();
        }

        async function confirmRename() {
            const newName = document.getElementById('newSessionName').value.trim();
            if (!newName || !renamingSessionId) return;
            
            try {
                const response = await fetch(`/api/session/rename/${renamingSessionId}?title=${encodeURIComponent(newName)}`);
                const data = await response.json();
                
                if (data.success) {
                    // Refresh sessions list
                    loadSessions();
                    closeRenameModal();
                } else {
                    alert('Error: ' + (data.error || 'Could not rename session'));
                }
            } catch (error) {
                alert('Error renaming session: ' + error.message);
            }
        }

        function closeRenameModal() {
            document.getElementById('renameModal').classList.remove('active');
            renamingSessionId = null;
        }

        function closeStatsModal() {
            document.getElementById('statsModal').classList.remove('active');
        }

        // Initialize - load both dashboard and sessions for dropdown
        Promise.all([loadDashboard(), loadSessions()]);
    </script>
</body>
</html>
